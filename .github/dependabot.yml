version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "safevixai/backend"
    labels:
      - "dependencies"
      - "backend"
    groups:
      backend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "pip"
    directory: "/chatbot_service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "safevixai/ai"
    labels:
      - "dependencies"
      - "chatbot"
    groups:
      chatbot-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 10
    reviewers:
      - "safevixai/frontend"
    labels:
      - "dependencies"
      - "frontend"
    groups:
      frontend-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "ci-cd"
    groups:
      github-actions-dependencies:
        patterns:
          - "*"

  # DEVOPS#30 FIX: Docker image updates
  - package-ecosystem: "docker"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "docker"
      - "backend"
    groups:
      backend-docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/chatbot_service"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "docker"
      - "chatbot"
    groups:
      chatbot-docker-dependencies:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Asia/Kolkata"
    labels:
      - "docker"
      - "frontend"
    groups:
      frontend-docker-dependencies:
        patterns:
          - "*"
