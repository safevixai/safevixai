name: OWASP ZAP Scan

on:
  schedule:
    - cron: '0 4 * * 0' # Every Sunday at 4 AM UTC
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target URL to scan'
        required: true
        default: 'https://app.safevixai.com'

permissions:
  contents: read
  issues: write

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    steps:
      - name: ZAP Scan
        uses: zaproxy/action-full-scan@v0.11
        with:
          target: ${{ github.event.inputs.target_url || 'https://app.safevixai.com' }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -T 5'
          issue_title: 'OWASP ZAP Security Scan'
          fail_action: true
          allow_issue_writing: true

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: zap_*.html
