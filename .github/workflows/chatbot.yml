name: Chatbot Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'chatbot_service/**'
      - '.github/workflows/chatbot.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'chatbot_service/**'

permissions:
  contents: read

jobs:
  test:
    name: Chatbot Pytests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: chatbot_service/requirements.txt

      - name: Install Chatbot Dependencies
        working-directory: ./chatbot_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi

      - name: Run Pytest
        working-directory: ./chatbot_service
        run: |
          if [ -d "tests" ] && [ "$(ls -A tests)" ]; then
            pytest tests/ -v --tb=short
          else
            echo "No tests found — skipping."
          fi
        env:
          # Stub env vars so settings dataclass doesn't crash at import
          REDIS_URL: ""
          MAIN_BACKEND_BASE_URL: "http://localhost:8000"
          GROQ_API_KEY: ""
          GOOGLE_API_KEY: ""
          ENVIRONMENT: "test"
          DEFAULT_LLM_PROVIDER: "template"
