name: Chatbot Service CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'chatbot_service/**'
      - '.github/workflows/chatbot.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'chatbot_service/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Chatbot Pytests
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: chatbot_service/requirements.txt

      - name: Install Chatbot Dependencies
        working-directory: ./chatbot_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi

      - name: Run Pytest
        working-directory: ./chatbot_service
        run: |
          pytest tests/ -v --tb=short
        env:
          PYTHONPATH: .
          REDIS_URL: redis://localhost:6379/0
          MAIN_BACKEND_BASE_URL: "http://localhost:8000"
          GROQ_API_KEY: ""
          GOOGLE_API_KEY: ""
          ENVIRONMENT: "test"
          DEFAULT_LLM_PROVIDER: "template"
