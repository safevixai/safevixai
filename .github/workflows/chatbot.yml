name: Chatbot CI

on:
  workflow_call:
  push:
    branches: [main]
    paths: ['chatbot_service/**', '.github/workflows/chatbot.yml']
  pull_request:
    branches: [main]
    paths: ['chatbot_service/**']

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: safevixai/chatbot

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: chatbot_service/requirements.txt

      - name: Install dependencies
        working-directory: chatbot_service
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx

      - name: Run tests with coverage
        working-directory: chatbot_service
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          DEFAULT_LLM_PROVIDER: template
          MAIN_BACKEND_BASE_URL: http://localhost:8000
          ADMIN_SECRET: test-admin-secret
        run: |
          pytest tests/ -v --cov=. --cov-branch --cov-report=xml --cov-report=term --cov-fail-under=95 -q

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: chatbot_service/coverage.xml
          flags: chatbot

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Lint with ruff
        continue-on-error: true
        working-directory: chatbot_service
        run: |
          pip install ruff
          ruff check --fix . --output-format=github || true

  build:
    if: github.ref == 'refs/heads/main'
    needs: [test, lint]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build, tag, and push image
        working-directory: chatbot_service
        run: |
          IMAGE_TAG=${{ github.sha }}
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
          docker tag $ECR_REPOSITORY:$IMAGE_TAG $ECR_REPOSITORY:latest
          docker push $ECR_REPOSITORY:$IMAGE_TAG
          docker push $ECR_REPOSITORY:latest
