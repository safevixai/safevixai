name: Bundle Analysis

on:
  pull_request:
    branches: [main]
    paths: ['frontend/**']

permissions:
  contents: read
  pull-requests: write

jobs:
  bundle-size:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

      - name: Analyze bundle size
        working-directory: frontend
        run: node scripts/bundle-analysis.mjs

      - name: Comment PR
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const buildDir = path.join(process.cwd(), '.next', 'static', 'chunks');
            const appDir = path.join(buildDir, 'app');
            const chunks = [];

            function collect(dir) {
              if (!fs.existsSync(dir)) return;
              for (const f of fs.readdirSync(dir)) {
                const fp = path.join(dir, f);
                if (f.endsWith('.js')) {
                  const size = fs.statSync(fp).size;
                  chunks.push({ name: path.relative(process.cwd(), fp), size });
                }
              }
            }
            collect(buildDir);
            collect(appDir);
            chunks.sort((a, b) => b.size - a.size);

            let table = '## Bundle Size Report\n\n| Chunk | Size |\n|------|------|\n';
            for (const c of chunks.slice(0, 20)) {
              const sizeKB = (c.size / 1024).toFixed(1);
              table += `| \`${c.name}\` | ${sizeKB} kB |\n`;
            }
            const totalKB = (chunks.reduce((s, c) => s + c.size, 0) / 1024).toFixed(1);
            table += `\n**Total: ${totalKB} kB** (${chunks.length} chunks)`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: table,
            });
