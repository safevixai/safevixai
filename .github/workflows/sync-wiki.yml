name: Wiki Documentation Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Wiki manager mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - check
          - fix
          - generate
          - update

permissions:
  contents: write
  pull-requests: write

jobs:
  wiki-sync:
    name: Update Wiki Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lint hand-written markdown
        uses: DavidAnson/markdownlint-cli2-action@v16
        continue-on-error: true
        with:
          globs: |
            docs/*.md
            *.md
            !docs/wiki/**/*
            !node_modules/**/*
          config: |
            {
              "MD013": false,
              "MD024": false,
              "MD033": false,
              "MD041": false
            }

      - name: Run wiki manager
        env:
          # Primary: GitHub Models (free via Student Developer Pack)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fallbacks (set as GitHub Secrets)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Email alerts on failure (optional)
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "=== Running wiki_manager.py in '$MODE' mode ==="
          python scripts/docs/wiki_manager.py "$MODE"

      - name: Post-run integrity check
        run: |
          echo "=== Wiki Integrity Report ==="
          CONTENT_COUNT=$(find docs/wiki/content -name "*.md" | wc -l)
          echo "Wiki content files: $CONTENT_COUNT"
          python scripts/docs/wiki_manager.py check --strict

      - name: Check for broken external links
        continue-on-error: true
        uses: lycheeverse/lychee-action@v1
        with:
          args: >
            --no-progress
            --exclude-mail
            --exclude 'file://'
            --exclude 'https://github.com/SafeVixAI/SafeVixAI'
            './docs/wiki/**/*.md'
            './docs/*.md'
            './*.md'
          fail: false

      - name: Validate code examples in wiki
        continue-on-error: true
        run: python scripts/docs/test-code-examples.py

      - name: Check internal links resolve
        continue-on-error: true
        run: python scripts/docs/check-links.py

      - name: Generate docs health dashboard
        run: python scripts/docs/generate-health-dashboard.py

      - name: Create Pull Request for Wiki Updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(wiki): auto-sync wiki documentation [automated]"
          title: "docs(wiki): Auto-sync Wiki Documentation"
          body: |
            Automated synchronization of wiki documentation files generated by `wiki_manager.py`.

            **Review required before merge.** Changes affect: docs/wiki/, docs/*.md, AGENTS.md, README.md, DESIGN.md, SETUP.md, SKILL.md.

            - [ ] Verify no stale references or outdated content (>90 days)
            - [ ] Check mermaid diagrams render correctly
            - [ ] Confirm glossary terms are used consistently
            - [ ] Verify code examples are valid (Python/TS/Bash)
            - [ ] Check internal links resolve to existing files
            - [ ] Verify no hallucinated API routes or env vars
          team-reviewers: |
            safevixai/core
          branch: "docs-wiki-auto-update"
          base: "main"
          add-paths: |
            docs/wiki/**
            docs/*.md
            AGENTS.md
            README.md
            DESIGN.md
            SETUP.md
            SKILL.md
