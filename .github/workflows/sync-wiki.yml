name: Wiki Documentation Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Wiki manager mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - check
          - fix
          - generate
          - update

permissions:
  contents: write
  pull-requests: write

jobs:
  wiki-sync:
    name: Update Wiki Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run wiki manager
        env:
          # Primary: GitHub Models (free via Student Developer Pack)
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Fallbacks (set as GitHub Secrets)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Email alerts on failure (optional)
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "=== Running wiki_manager.py in '$MODE' mode ==="
          python scripts/docs/wiki_manager.py "$MODE"

      - name: Post-run integrity check
        run: |
          echo "=== Wiki Integrity Report ==="

          CONTENT_COUNT=$(find docs/wiki/content -name "*.md" | wc -l)
          echo "Wiki content files: $CONTENT_COUNT"

          # Stale ref check
          STALE=$(grep -rl "sentence-transformers\|SentenceTransformer\|admin123\|mock-jwt" docs/wiki/content/ 2>/dev/null | wc -l || echo 0)
          echo "Stale references: $STALE files"

          if [ "$STALE" -gt 0 ]; then
            echo "::warning::$STALE files still have stale references"
          fi

          # LLM vs AST generated
          LLM_DOCS=$(grep -rl "Auto-generated stub\|auto-generated by" docs/wiki/content/ 2>/dev/null | wc -l || echo 0)
          RICH_DOCS=$((CONTENT_COUNT - LLM_DOCS))
          echo "LLM-generated: $RICH_DOCS | AST stubs: $LLM_DOCS"

      - name: Create Pull Request for Wiki Updates
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "docs(wiki): auto-sync wiki documentation [automated]"
          title: "docs(wiki): Auto-sync Wiki Documentation"
          body: "Automated synchronization of wiki documentation files generated by `wiki_manager.py`."
          branch: "docs-wiki-auto-update"
          base: "main"
          add-paths: |
            docs/wiki/**
            docs/*.md
            AGENTS.md
            README.md
            DESIGN.md
            SETUP.md
            SKILL.md
