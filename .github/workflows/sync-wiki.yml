name: Wiki Documentation Sync

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'chatbot_service/**'
      - 'frontend/**'
      - 'data/**'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Wiki manager mode'
        required: false
        default: 'full'
        type: choice
        options:
          - full
          - check
          - fix
          - generate
          - update

permissions:
  contents: write

jobs:
  wiki-sync:
    name: Update Wiki Documentation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run wiki manager
        env:
          # LLM providers for doc generation (set as GitHub Secrets)
          # Priority: OpenRouter → Mistral → Gemini (fallback)
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          # Email alerts on failure (optional)
          ALERT_EMAIL: ${{ secrets.ALERT_EMAIL }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
        run: |
          MODE="${{ github.event.inputs.mode || 'full' }}"
          echo "=== Running wiki_manager.py in '$MODE' mode ==="
          python scripts/wiki_manager.py "$MODE"

      - name: Post-run integrity check
        run: |
          echo "=== Wiki Integrity Report ==="

          CONTENT_COUNT=$(find docs/wiki/content -name "*.md" | wc -l)
          echo "Wiki content files: $CONTENT_COUNT"

          # Stale ref check
          STALE=$(grep -rl "sentence-transformers\|SentenceTransformer\|admin123\|mock-jwt" docs/wiki/content/ 2>/dev/null | wc -l || echo 0)
          echo "Stale references: $STALE files"

          if [ "$STALE" -gt 0 ]; then
            echo "::warning::$STALE files still have stale references"
          fi

          # LLM vs AST generated
          LLM_DOCS=$(grep -rl "Auto-generated stub\|auto-generated by" docs/wiki/content/ 2>/dev/null | wc -l || echo 0)
          RICH_DOCS=$((CONTENT_COUNT - LLM_DOCS))
          echo "LLM-generated: $RICH_DOCS | AST stubs: $LLM_DOCS"

      - name: Commit wiki updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add docs/wiki/ docs/*.md AGENTS.md README.md DESIGN.md SETUP.md SKILL.md 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No wiki changes to commit."
          else
            CONTENT_COUNT=$(find docs/wiki/content -name "*.md" | wc -l)
            NEW_FILES=$(git diff --cached --name-only --diff-filter=A | wc -l)
            FIXED_FILES=$(git diff --cached --name-only --diff-filter=M | wc -l)

            MSG="docs(wiki): auto-sync ${CONTENT_COUNT} wiki files"
            [ "$NEW_FILES" -gt 0 ] && MSG="$MSG — ${NEW_FILES} new"
            [ "$FIXED_FILES" -gt 0 ] && MSG="$MSG, ${FIXED_FILES} fixed"

            git commit -m "$MSG [automated]"
            git push
            echo "✅ Wiki updates committed: $NEW_FILES new, $FIXED_FILES fixed"
          fi
