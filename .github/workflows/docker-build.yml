name: Docker Build & Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/Dockerfile'
      - 'chatbot_service/Dockerfile'
      - 'frontend/Dockerfile.frontend'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [ "main" ]
    paths:
      - 'backend/Dockerfile'
      - 'chatbot_service/Dockerfile'
      - 'frontend/Dockerfile.frontend'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read
  security-events: write
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-scan:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: backend
            dockerfile: backend/Dockerfile
            image: svai-backend
          - context: chatbot_service
            dockerfile: chatbot_service/Dockerfile
            image: svai-chatbot
          - context: frontend
            dockerfile: frontend/Dockerfile.frontend
            image: svai-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          tags: ${{ matrix.image }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload Trivy scan results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'

      - name: Push to GHCR (main branch only) with versioned tags
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA7="${{ github.sha }}" && SHA7="${SHA7:0:7}"
          DATE_TAG="$(date +'%Y%m%d')-${SHA7}"
          IMG="ghcr.io/${REPO_LOWER}/${{ matrix.image }}"
          docker tag ${{ matrix.image }} "${IMG}:latest"
          docker tag ${{ matrix.image }} "${IMG}:${SHA7}"
          docker tag ${{ matrix.image }} "${IMG}:${DATE_TAG}"
          docker push "${IMG}:latest"
          docker push "${IMG}:${SHA7}"
          docker push "${IMG}:${DATE_TAG}"
          # Keep only last 10 tags per image
          TAGS=$(docker images --filter=reference="${IMG}" --format "{{.Tag}}" | sort -r | tail -n +11)
          for TAG in $TAGS; do
            docker rmi "${IMG}:${TAG}" 2>/dev/null || true
          done
