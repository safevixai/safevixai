name: Docker Build & Scan

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/Dockerfile'
      - 'chatbot_service/Dockerfile'
      - 'frontend/Dockerfile.frontend'
      - 'docker-compose.yml'
      - '.github/workflows/docker-build.yml'
  push:
    branches: [ "main" ]
    paths:
      - 'backend/Dockerfile'
      - 'chatbot_service/Dockerfile'
      - 'frontend/Dockerfile.frontend'
      - '.github/workflows/docker-build.yml'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-scan:
    name: Build & Scan Images
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - context: backend
            dockerfile: backend/Dockerfile
            image: svai-backend
          - context: chatbot_service
            dockerfile: chatbot_service/Dockerfile
            image: svai-chatbot
          - context: frontend
            dockerfile: frontend/Dockerfile.frontend
            image: svai-frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ matrix.image }} -f ${{ matrix.dockerfile }} ${{ matrix.context }}
        continue-on-error: true

      - name: Run Trivy vulnerability scanner
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ matrix.image }}
          format: 'sarif'
          output: 'trivy-${{ matrix.image }}.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Upload Trivy scan results to GitHub
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        continue-on-error: true
        with:
          sarif_file: 'trivy-${{ matrix.image }}.sarif'

      - name: Push to GHCR (main branch only)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker tag ${{ matrix.image }} ghcr.io/${REPO_LOWER}/${{ matrix.image }}:latest
          docker push ghcr.io/${REPO_LOWER}/${{ matrix.image }}:latest
