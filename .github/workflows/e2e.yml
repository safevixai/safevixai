name: Frontend E2E & Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run Jest Tests
        working-directory: ./frontend
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

  full-e2e:
    name: Full E2E Suite
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend (standalone)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: npm run build

      - name: Start standalone server (background)
        working-directory: ./frontend
        env:
          PORT: "3100"
          HOSTNAME: "127.0.0.1"
        run: |
          echo "Starting standalone server on port 3100..."
          node .next/standalone/server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100 > /dev/null 2>&1; then
              echo "Server is ready!"
              echo "PID=$SERVER_PID" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 1
          done
          echo "Server failed to start within 60s"
          cat server.log 2>/dev/null || true
          kill $SERVER_PID 2>/dev/null || true
          exit 1

      - name: Start mock API server
        run: |
          pip install fastapi uvicorn 2>/dev/null
          python tests/e2e_mock_server.py &
          echo "Mock API server started on :8000"
          sleep 3

      - name: Run E2E tests (all flows except visual)
        working-directory: ./frontend
        env:
          CI: 'true'
          CI_SKIP_WEBSERVER: 'true'
          E2E_BASE_URL: http://127.0.0.1:3100
          E2E_PORT: "3100"
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: npx playwright test e2e/ --grep-invert="Visual Regression|visual"

      - name: Run API contract tests
        working-directory: ./frontend
        env:
          CI: 'true'
          CI_SKIP_WEBSERVER: 'true'
          E2E_BASE_URL: http://127.0.0.1:3100
          E2E_PORT: "3100"
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: npx playwright test tests/api-contract.spec.ts

      - name: Upload E2E results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: failure()
        with:
          name: full-e2e-results
          path: frontend/test-results/
          retention-days: 7

      - name: Stop standalone server
        if: always()
        working-directory: ./frontend
        run: |
          if [ -n "$PID" ]; then
            kill $PID 2>/dev/null || true
            echo "Server stopped"
          fi

