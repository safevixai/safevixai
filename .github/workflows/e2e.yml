name: E2E Tests

on:
  push:
    branches: [main]
    paths: ['frontend/**', 'backend/**', 'chatbot_service/**']
  schedule:
    - cron: '0 6 * * 1' # Every Monday at 6 AM UTC

permissions:
  contents: read
  checks: write

env:
  DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/safevixai_e2e
  REDIS_URL: redis://localhost:6379/0
  ADMIN_SECRET: e2e-test-secret

jobs:
  e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: safevixai_e2e
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install uvicorn httpx

      - name: Install chatbot dependencies
        run: |
          cd chatbot_service
          pip install -r requirements.txt
          pip install uvicorn httpx

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci
          npm install playwright @playwright/test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Start backend
        working-directory: backend
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/safevixai_e2e
          REDIS_URL: redis://localhost:6379/0
          ENVIRONMENT: test
          ADMIN_SECRET: e2e-test-secret
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8000 --log-level warning &
          sleep 5

      - name: Start chatbot
        working-directory: chatbot_service
        env:
          ENVIRONMENT: test
          REDIS_URL: redis://localhost:6379/0
          DEFAULT_LLM_PROVIDER: template
          MAIN_BACKEND_BASE_URL: http://localhost:8000
          ADMIN_SECRET: e2e-test-secret
        run: |
          nohup uvicorn main:app --host 0.0.0.0 --port 8010 --log-level warning &
          sleep 5

      - name: Start frontend
        working-directory: frontend
        env:
          NODE_ENV: test
          NEXT_PUBLIC_BACKEND_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: |
          nohup node .next/standalone/server.js &
          sleep 3

      - name: Health check
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8000/health && break
            sleep 2
          done

      - name: Run E2E tests
        working-directory: frontend
        env:
          BACKEND_URL: http://localhost:8000
          CHATBOT_URL: http://localhost:8010
        run: |
          npx playwright test e2e/ --reporter=github --grep-invert="Visual Regression|visual"

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
