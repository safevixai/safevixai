name: Frontend E2E & Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run Jest Tests
        working-directory: ./frontend
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

  sos-e2e:
    name: SOS E2E Flow
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend (standalone)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: |
          npm run build
          # Copy public assets to standalone build for E2E tests
          cp -r public .next/standalone/public

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: 'true'
          E2E_BASE_URL: http://127.0.0.1:3100
          E2E_PORT: "3100"
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: npx playwright test e2e/sos-flow.spec.ts

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sos-e2e-results
          path: frontend/test-results/
          retention-days: 7

  deploy:
    name: Deploy to Vercel
    needs: [unit-tests, sos-e2e]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v20
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          vercel-args: '--prod'
