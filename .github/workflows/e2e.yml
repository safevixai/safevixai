name: Frontend E2E & Integration Tests

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/e2e.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-tests:
    name: Jest Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run Jest Tests
        working-directory: ./frontend
        run: npm test -- --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

  sos-e2e:
    name: SOS E2E Flow
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Build frontend (standalone)
        working-directory: ./frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: |
          npm run build
          # Copy public assets to standalone build for E2E tests
          cp -r public .next/standalone/public

      - name: Start standalone server (background)
        working-directory: ./frontend
        env:
          PORT: "3100"
          HOSTNAME: "127.0.0.1"
        run: |
          echo "Starting standalone server on port 3100..."
          node .next/standalone/server.js &
          SERVER_PID=$!
          echo "Server PID: $SERVER_PID"
          # Wait for server to be ready (curl retries up to 60s)
          for i in $(seq 1 60); do
            if curl -sf http://127.0.0.1:3100 > /dev/null 2>&1; then
              echo "Server is ready!"
              echo "PID=$SERVER_PID" >> $GITHUB_ENV
              exit 0
            fi
            echo "Waiting for server... ($i/60)"
            sleep 1
          done
          echo "Server failed to start within 60s"
          cat server.log 2>/dev/null || true
          kill $SERVER_PID 2>/dev/null || true
          exit 1

      - name: Run E2E tests
        working-directory: ./frontend
        env:
          CI: 'true'
          CI_SKIP_WEBSERVER: 'true'
          E2E_BASE_URL: http://127.0.0.1:3100
          E2E_PORT: "3100"
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
        run: npx playwright test e2e/sos-flow.spec.ts

      - name: Upload E2E results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sos-e2e-results
          path: frontend/test-results/
          retention-days: 7

      - name: Stop standalone server
        if: always()
        working-directory: ./frontend
        run: |
          if [ -n "$PID" ]; then
            kill $PID 2>/dev/null || true
            echo "Server stopped"
          fi


