name: Stale Issue Management

on:
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity occurs
            within 14 days. Thank you for your contributions.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed if no further activity
            occurs within 14 days. Thank you for your contributions.
          close-issue-message: >
            This issue has been automatically closed due to inactivity.
            Please feel free to reopen if the issue persists.
          close-pr-message: >
            This pull request has been automatically closed due to inactivity.
            Please feel free to reopen if needed.

          days-before-stale: 60
          days-before-close: 14
          days-before-pr-stale: 60
          days-before-pr-close: 14

          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: security, bug, enhancement, pinned
          exempt-pr-labels: security, dependencies, pinned

          operations-per-run: 100
