name: Backend Core CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'backend/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Backend Pytests
    runs-on: ubuntu-latest
    continue-on-error: true

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: safevixai_test
          POSTGRES_USER: svai
          POSTGRES_PASSWORD: svai_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U svai -d safevixai_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 3s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f "requirements-dev.txt" ]; then pip install -r requirements-dev.txt; fi

      - name: Run Alembic migrations
        working-directory: ./backend
        run: |
          alembic upgrade head
        env:
          DATABASE_URL: postgresql+asyncpg://svai:svai_test_password@localhost:5432/safevixai_test

      - name: Run Pytest
        working-directory: ./backend
        run: |
          pytest tests/ -v --tb=short
        env:
          DATABASE_URL: postgresql+asyncpg://svai:svai_test_password@localhost:5432/safevixai_test
          REDIS_URL: redis://localhost:6379/0
          SUPABASE_URL: "https://stub.supabase.co"
          SUPABASE_ANON_KEY: "stub"
          SUPABASE_SERVICE_ROLE_KEY: "stub"
          ENVIRONMENT: "test"
