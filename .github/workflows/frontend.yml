name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Frontend Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./frontend
        run: |
          npx eslint . --ext .js,.jsx,.ts,.tsx --max-warnings=250

      - name: Run TypeScript validation
        working-directory: ./frontend
        run: |
          npx tsc --noEmit

      - name: Validate i18n key parity
        working-directory: ./frontend
        run: npm run lint:i18n

  build-and-test:
    name: Frontend Build & Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run production build
        working-directory: ./frontend
        run: |
          npm run build
          # Copy public assets to standalone build for E2E tests
          cp -r public .next/standalone/public
        env:
          ANALYZE: 'true'
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

      - name: Check bundle size
        run: |
          $MAIN_JS = Get-ChildItem -Recurse -Path ".next/static/chunks" -Filter "main-*.js" | Select-Object -First 1
          if ($MAIN_JS) {
            $SIZE_KB = [math]::Round($MAIN_JS.Length / 1KB)
            Write-Host "Main bundle: ${SIZE_KB}KB"
            if ($SIZE_KB -gt 300) {
              Write-Host "::warning title=Bundle Size::Main bundle is ${SIZE_KB}KB (limit: 300KB)"
            }
          }
        shell: pwsh
        working-directory: ./frontend

      - name: Run Jest unit tests
        working-directory: ./frontend
        run: npm test -- --coverage --coverageReporters=text-summary --coverageReporters=cobertura --passWithNoTests
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

      - name: Check coverage threshold
        working-directory: ./frontend
        run: |
          if [ -f coverage/cobertura-coverage.xml ]; then
            echo "Checking coverage thresholds..."
            python3 -c "import xml.etree.ElementTree as ET,sys;r=ET.parse('coverage/cobertura-coverage.xml').getroot();lr=float(r.get('line-rate',0));br=float(r.get('branch-rate',0));print(f'Line coverage: {lr:.2%}');print(f'Branch coverage: {br:.2%}');exit(0 if lr>=0.5 and br>=0.4 else 1)"
          else
            echo "cobertura-coverage.xml not found - skipping threshold check"
          fi

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          retention-days: 14

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (including visual regression)
        working-directory: ./frontend
        run: npx playwright test
        env:
          CI: 'true'
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010
          E2E_BASE_URL: http://127.0.0.1:3100

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-screenshots
          path: frontend/test-results/
          retention-days: 7

      - name: Upload visual regression baselines
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: visual-baselines
          path: frontend/e2e/**/*.png
          retention-days: 30
