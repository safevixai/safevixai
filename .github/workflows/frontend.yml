name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Frontend Lint & TypeScript
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Run ESLint
        working-directory: ./frontend
        run: npm run lint

      - name: Run TypeScript validation
        working-directory: ./frontend
        run: npx tsc --noEmit

      - name: Run production build
        working-directory: ./frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

      - name: Run Jest unit tests
        working-directory: ./frontend
        run: npm test -- --coverage --coverageReporters=text-summary --coverageReporters=cobertura
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

      - name: Upload Frontend Coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/cobertura-coverage.xml
          retention-days: 14

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests (including visual regression)
        working-directory: ./frontend
        run: npx playwright test
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
          NEXT_PUBLIC_CHATBOT_URL: http://localhost:8010

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-failure-screenshots
          path: frontend/test-results/
          retention-days: 7

      - name: Upload visual regression baselines
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: visual-baselines
          path: frontend/e2e/**/*.png
          retention-days: 30
