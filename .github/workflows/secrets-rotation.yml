name: Secrets Rotation

on:
  schedule:
    - cron: '0 2 1 * *' # First day of every month at 2 AM UTC
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to rotate (backend, chatbot, infra)'
        required: false
        default: ''
      key:
        description: 'Specific key to rotate'
        required: false
        default: ''

permissions:
  contents: read
  id-token: write

jobs:
  rotate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install PyYAML

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Rotate secrets
        run: |
          args="--ci"
          if [ -n "${{ github.event.inputs.service }}" ]; then
            args="$args --service ${{ github.event.inputs.service }}"
          fi
          if [ -n "${{ github.event.inputs.key }}" ]; then
            args="$args --key ${{ github.event.inputs.key }}"
          fi
          python scripts/rotate-secrets.py $args

      - name: Upload rotation log
        uses: actions/upload-artifact@v4
        with:
          name: rotation-log
          path: rotation-log-*.json
