name: Deploy Enterprise Docs
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs Material
        run: pip install -r mkdocs-requirements.txt

      - name: Inject Root Documents
        run: |
          # Copy root markdown files into docs/ so MkDocs can build them
          cp README.md docs/index.md
          cp SETUP.md docs/SETUP.md
          cp DESIGN.md docs/DESIGN.md
          cp AGENTS.md docs/AGENTS.md
          cp SKILL.md docs/SKILL.md

          # Copy OpenAPI specs into docs/ for swagger-ui-tag plugin
          cp backend/openapi.json docs/backend.json
          cp chatbot_service/openapi.json docs/chatbot.json

      - name: Generate Docs Health Dashboard
        run: python scripts/docs/generate-health-dashboard.py || true

      - name: Generate PDF export
        run: |
          MKDOCS_EXPORTER_PDF=true mkdocs build --clean
        env:
          MKDOCS_EXPORTER_PDF: "true"

      - name: Generate API Changelog
        run: python scripts/docs/generate-api-changelog.py || true

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" =~ ^refs/tags/v ]]; then
            echo "version=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          else
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Deploy versioned docs (mike)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          mike deploy --push --update-aliases ${{ steps.version.outputs.version }} latest
        env:
          PLAUSIBLE_DOMAIN: ${{ secrets.PLAUSIBLE_DOMAIN || '' }}
          PLAUSIBLE_SRC: ${{ secrets.PLAUSIBLE_SRC || '' }}
