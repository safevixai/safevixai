name: Security & SAST Audit

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "0 0 * * 0"

permissions:
  contents: read

jobs:
  security-audit:
    name: Full Stack Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci --legacy-peer-deps

      - name: Frontend NPM Audit (High/Critical only)
        working-directory: ./frontend
        run: npm audit --audit-level=high

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install Python Security Tools
        run: pip install bandit pip-audit

      - name: Bandit SAST - Backend
        working-directory: ./backend
        run: bandit -r . -lll --exclude ./tests,./.venv,./data

      - name: Bandit SAST - Chatbot Service
        working-directory: ./chatbot_service
        run: bandit -r . -lll --exclude ./tests,./.venv,./data

      - name: Pip Audit - Backend Dependency CVE Scan
        working-directory: ./backend
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          fi
          if [ -f requirements-render.txt ]; then
            pip-audit -r requirements-render.txt
          fi

      - name: Pip Audit - Chatbot Dependency CVE Scan
        working-directory: ./chatbot_service
        run: |
          if [ -f requirements.txt ]; then
            pip-audit -r requirements.txt
          fi
          if [ -f requirements-render.txt ]; then
            pip-audit -r requirements-render.txt
          fi
