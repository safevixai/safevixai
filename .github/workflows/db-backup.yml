name: Database Backup
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  backup:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: safevixai
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'postgres' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Run backup
        run: |
          mkdir -p backups
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          PGPASSWORD=${{ secrets.POSTGRES_PASSWORD || 'postgres' }} pg_dump \
            -h localhost \
            -U postgres \
            -d safevixai \
            --no-owner \
            --no-acl \
            --compress=9 \
            --file="backups/safevixai_${TIMESTAMP}.sql.gz" \
            --format=custom

      - uses: actions/upload-artifact@v7
        with:
          name: safevixai-db-backup
          path: backups/
          retention-days: 7

  backup-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Backup Production Database
        env:
          PROD_DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          if [ -z "$PROD_DATABASE_URL" ]; then
            echo "PROD_DATABASE_URL not set — skipping production backup"
            exit 0
          fi
          pg_dump "$PROD_DATABASE_URL" \
            --no-owner --no-acl \
            --file=production_backup.sql
      - name: Upload Production Backup
        if: env.PROD_DATABASE_URL != ''
        uses: actions/upload-artifact@v7
        with:
          name: production-db-backup
          path: production_backup.sql
          retention-days: 30
