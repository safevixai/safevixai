services:
  # ── Main FastAPI Backend ─────────────────────────────────────────────────
  - type: web
    name: safevixai-backend
    env: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: DB_POOL_SIZE
        value: "5"
      - key: DB_MAX_OVERFLOW
        value: "10"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: AUTH_OPERATOR_EMAIL
        sync: false
      - key: AUTH_OPERATOR_PASSWORD_HASH
        sync: false
      - key: AUTH_OPERATOR_NAME
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: CHATBOT_SERVICE_URL
        sync: false
      - key: LOCAL_UPLOAD_BASE_URL
        sync: false
      - key: ROAD_PHOTO_BUCKET
        value: road-photos
      - key: OPENROUTESERVICE_API_KEY
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: HEALTHSITES_TOKEN
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: ALERT_EMAIL_PASSWORD
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false

  # ── Chatbot / RAG Service ────────────────────────────────────────────────
  - type: web
    name: safevixai-chatbot
    env: python
    plan: free
    region: singapore
    rootDir: chatbot_service
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 75
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: REDIS_URL
        sync: false
      - key: MAIN_BACKEND_BASE_URL
        sync: false
      - key: DEFAULT_LLM_PROVIDER
        value: groq
      - key: EMBEDDING_MODEL
        value: safevixai-local-hash
      - key: CORS_ORIGINS
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-1.5-flash
      - key: CEREBRAS_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: MISTRAL_API_KEY
        sync: false
      - key: TOGETHER_API_KEY
        sync: false
      - key: SARVAM_API_KEY
        sync: false
      - key: HF_TOKEN
        sync: false
      - key: NVIDIA_NIM_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: W3W_API_KEY
        sync: false
      - key: OPENCAGE_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ALERT_EMAIL
        sync: false
      - key: ALERT_EMAIL_PASSWORD
        sync: false
      - key: ALERT_EMAIL_TO
        sync: false
