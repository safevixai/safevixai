version: "3.9"

# DEVOPS#11 FIX: Isolated networks prevent compromised frontend from reaching DB directly
networks:
  data-net:
    driver: bridge
  backend-net:
    driver: bridge
  frontend-net:
    driver: bridge

services:
  # ────────────────────────────────────────────────────────────────
  # PostgreSQL + PostGIS — spatial database
  # DEVOPS#2 FIX: Ports removed from host exposure
  # DEVOPS#10 FIX: Password from env var with fallback
  # ────────────────────────────────────────────────────────────────
  postgres:
    image: postgis/postgis:16-3.4
    container_name: svai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: safevixai
      POSTGRES_USER: svai
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-svai_dev_password}
    # DEVOPS#2: No ports exposed to host — internal network only
    networks:
      - data-net
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U svai -d safevixai"]
      interval: 10s
      timeout: 5s
      retries: 5
    # DEVOPS#22: Resource limits
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ────────────────────────────────────────────────────────────────
  # Redis — caching + session memory
  # DEVOPS#2 FIX: Ports removed from host exposure
  # DEVOPS#20 FIX: Password authentication added
  # ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: svai_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-svai_redis_password}
    # DEVOPS#2: No ports exposed to host — internal network only
    networks:
      - data-net
      - backend-net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-svai_redis_password}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: '0.5'

  # ────────────────────────────────────────────────────────────────
  # Backend — FastAPI + PostGIS
  # ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: svai_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://svai:${POSTGRES_PASSWORD:-svai_dev_password}@postgres:5432/safevixai
      REDIS_URL: redis://:${REDIS_PASSWORD:-svai_redis_password}@redis:6379/0
      CHATBOT_SERVICE_URL: http://chatbot:8010
      ENVIRONMENT: development
    networks:
      - data-net
      - backend-net
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

  # ────────────────────────────────────────────────────────────────
  # Chatbot Service — LangChain RAG + Multi-provider LLM
  # ────────────────────────────────────────────────────────────────
  chatbot:
    build:
      context: ./chatbot_service
      dockerfile: Dockerfile
    container_name: svai_chatbot
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file: ./chatbot_service/.env
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD:-svai_redis_password}@redis:6379/1
      MAIN_BACKEND_BASE_URL: http://backend:8000
      ENVIRONMENT: development
    networks:
      - backend-net
    ports:
      - "8010:8010"
    volumes:
      - ./chatbot_service/data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '2.0'

  # ────────────────────────────────────────────────────────────────
  # Frontend — Next.js 15 PWA
  # ────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.frontend
    container_name: svai_frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      chatbot:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_CHATBOT_URL: http://chatbot:8010
    networks:
      - frontend-net
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  postgres_data:
  redis_data:
