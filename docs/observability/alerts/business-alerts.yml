groups:
  - name: safevixai-business-alerts
    interval: 30s
    rules:
      # SOS dispatch failure rate > 10%
      - alert: HighSOSFailureRate
        expr: |
          sum(rate(sos_dispatch_total{status="failed"}[5m]))
          /
          sum(rate(sos_dispatch_total[5m]))
          > 0.10
        for: 2m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "SOS dispatch failure rate is {{ $value | humanizePercentage }}"
          description: "More than 10% of SOS dispatches are failing. This is a critical safety feature."

      # SOS response time p95 > 5 seconds
      - alert: HighSOSResponseTime
        expr: |
          histogram_quantile(0.95, rate(sos_response_time_seconds_bucket[5m]))
          > 5
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "SOS response time p95 is {{ $value }}s"
          description: "SOS dispatch is taking longer than 5 seconds at p95."

      # Chatbot provider fallback rate > 20%
      - alert: HighChatbotFallbackRate
        expr: |
          sum(rate(chatbot_fallback_total[5m]))
          /
          sum(rate(chatbot_request_total[5m]))
          > 0.20
        for: 5m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "Chatbot fallback rate is {{ $value | humanizePercentage }}"
          description: "More than 20% of chatbot requests are falling back to secondary providers."

      # Chatbot response time p95 > 10 seconds
      - alert: HighChatbotResponseTime
        expr: |
          histogram_quantile(0.95, rate(chatbot_response_time_seconds_bucket[5m]))
          > 10
        for: 5m
        labels:
          severity: warning
          team: ai
        annotations:
          summary: "Chatbot response time p95 is {{ $value }}s"
          description: "Chatbot responses are taking longer than 10 seconds at p95."

      # API error rate > 5%
      - alert: HighAPIErrorRate
        expr: |
          sum(rate(api_request_total{status_code=~"5.."}[5m]))
          /
          sum(rate(api_request_total[5m]))
          > 0.05
        for: 5m
        labels:
          severity: critical
          team: backend
        annotations:
          summary: "API error rate is {{ $value | humanizePercentage }}"
          description: "More than 5% of API requests are returning 5xx errors."

      # API response time p95 > 2 seconds
      - alert: HighAPIResponseTime
        expr: |
          histogram_quantile(0.95, rate(api_request_time_seconds_bucket[5m]))
          > 2
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "API response time p95 is {{ $value }}s"
          description: "API responses are taking longer than 2 seconds at p95."

      # Cache hit rate < 50%
      - alert: LowCacheHitRate
        expr: |
          sum(rate(cache_hit_total[5m]))
          /
          (sum(rate(cache_hit_total[5m])) + sum(rate(cache_miss_total[5m])))
          < 0.50
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Cache hit rate is {{ $value | humanizePercentage }}"
          description: "Cache hit rate dropped below 50%. Check Redis connectivity."

      # Active tracking sessions dropped to 0 unexpectedly
      - alert: NoActiveTrackingSessions
        expr: |
          tracking_sessions_active == 0
          and
          changes(tracking_sessions_active[1h]) > 0
        for: 10m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "No active tracking sessions despite recent activity"
          description: "All tracking sessions may have expired or failed."

      # Emergency lookup failure rate > 15%
      - alert: HighEmergencyLookupFailure
        expr: |
          sum(rate(emergency_lookup_total{source="overpass"}[5m]))
          /
          sum(rate(emergency_lookup_total[5m]))
          > 0.85
        for: 5m
        labels:
          severity: warning
          team: backend
        annotations:
          summary: "Emergency lookups are falling back to cache {{ $value | humanizePercentage }} of the time"
          description: "Overpass API may be unreachable. Verify external service connectivity."
