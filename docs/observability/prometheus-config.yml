# Prometheus Configuration for SafeVixAI
# Deploy alongside Grafana for full observability stack

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Backend service metrics
  - job_name: 'safevixai-backend'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['backend:8000']
        labels:
          service: 'backend'
          environment: '${ENVIRONMENT:-production}'

  # Chatbot service metrics (if Prometheus endpoint added)
  - job_name: 'safevixai-chatbot'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['chatbot:8010']
        labels:
          service: 'chatbot'
          environment: '${ENVIRONMENT:-production}'

  # Node exporter for system metrics
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

# Alerting rules
rule_files:
  - 'alerts/*.yml'

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
