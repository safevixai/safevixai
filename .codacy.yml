---
exclude_paths:
  - "**/.next/**"
  - "**/build/**"
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/.venv/**"
  - "**/venv/**"
  - "backend/models/pothole.pt"
  - "**/*.pt"
engines:
  duplication:
    exclude_paths:
      - "frontend/node_modules/**"
      - "node_modules/**"
      - "backend/venv/**"
      - ".venv/**"
      - "backend/models/pothole.pt"
      - "**/*.pt"
  eslint:
    enabled: true
  pmd:
    enabled: false
  pmd-legacy:
    enabled: false
