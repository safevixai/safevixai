---
exclude-paths:
  - "backend/models/pothole.pt"
  - "**/*.pt"
  - "**/*.pdf"
  - "**/*.PDF"
  - "**/*.png"
  - "**/*.onnx"
  - "**/*.docx"
  - "**/*.bin"
  - "**/*.sqlite3"
  - "**/*.gz"
  - "frontend/public/**"
  - "frontend/e2e/visual.spec.ts-snapshots/**"
  - "chatbot_service/data/chroma_db/**"
  - "chatbot_service/data/accidents/**"
  - "e2e/**"
  - "node_modules/**"
  - "frontend/node_modules/**"
  - "backend/venv/**"
  - ".venv/**"
tools:
  pylintpython3:
    enabled: true
  metrics:
    enabled: true
  pmd:
    enabled: false
  pmd-legacy:
    enabled: false
  eslint:
    enabled: false
