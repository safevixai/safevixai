apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secretsmanager
spec:
  provider:
    aws:
      service: SecretsManager
      region: ap-south-1
      auth:
        jwt:
          serviceAccountRef:
            name: safevixai-backend
            namespace: safevixai
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: safevixai-backend-secrets
  namespace: safevixai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: safevixai-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DATABASE_URL
      remoteRef:
        key: safevixai-backend-env
        property: DATABASE_URL
    - secretKey: REDIS_URL
      remoteRef:
        key: safevixai-backend-env
        property: REDIS_URL
    - secretKey: ADMIN_SECRET
      remoteRef:
        key: safevixai-backend-env
        property: ADMIN_SECRET
    - secretKey: CHATBOT_SERVICE_URL
      remoteRef:
        key: safevixai-backend-env
        property: CHATBOT_SERVICE_URL
---
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: safevixai-chatbot-secrets
  namespace: safevixai
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: aws-secretsmanager
    kind: ClusterSecretStore
  target:
    name: safevixai-chatbot-secrets
    creationPolicy: Owner
  data:
    - secretKey: REDIS_URL
      remoteRef:
        key: safevixai-chatbot-env
        property: REDIS_URL
    - secretKey: GROQ_API_KEY
      remoteRef:
        key: safevixai-chatbot-env
        property: GROQ_API_KEY
    - secretKey: GEMINI_API_KEY
      remoteRef:
        key: safevixai-chatbot-env
        property: GEMINI_API_KEY
    - secretKey: HF_TOKEN
      remoteRef:
        key: safevixai-chatbot-env
        property: HF_TOKEN
    - secretKey: MAIN_BACKEND_BASE_URL
      remoteRef:
        key: safevixai-chatbot-env
        property: MAIN_BACKEND_BASE_URL
