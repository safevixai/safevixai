apiVersion: apps/v1
kind: Deployment
metadata:
  name: safevixai-chatbot
  namespace: safevixai
  labels:
    app: safevixai-chatbot
    tier: chatbot
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: safevixai-chatbot
  template:
    metadata:
      labels:
        app: safevixai-chatbot
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: chatbot
          image: safevixai/chatbot:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false # Needs write access to data/chroma_db if file-backed SQLite Chroma is used
            capabilities:
              drop:
                - ALL
          envFrom:
            - configMapRef:
                name: safevixai-chatbot-config
            - secretRef:
                name: safevixai-chatbot-secrets
          ports:
            - containerPort: 8010
              name: http
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8010
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            successThreshold: 1
            failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: safevixai-chatbot-service
  namespace: safevixai
  labels:
    app: safevixai-chatbot
spec:
  type: ClusterIP
  ports:
    - port: 8010
      targetPort: 8010
      protocol: TCP
      name: http
  selector:
    app: safevixai-chatbot
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: safevixai-chatbot-hpa
  namespace: safevixai
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: safevixai-chatbot
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: safevixai-chatbot-pdb
  namespace: safevixai
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: safevixai-chatbot
