apiVersion: v1
kind: ResourceQuota
metadata:
  name: safevixai-quota
  namespace: safevixai
spec:
  hard:
    requests.cpu: "20"
    requests.memory: "40Gi"
    limits.cpu: "40"
    limits.memory: "80Gi"
    pods: "30"
    services: "10"
    persistentvolumeclaims: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: safevixai-limits
  namespace: safevixai
spec:
  limits:
    - default:
        cpu: "2"
        memory: "2Gi"
      defaultRequest:
        cpu: "200m"
        memory: "256Mi"
      type: Container
