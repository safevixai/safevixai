apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: safevixai

namespace: safevixai

resources:
  - namespace.yaml
  - priority-class.yaml
  - resource-quota.yaml
  - service-account.yaml
  - backend-config.yaml
  - chatbot-config.yaml
  - frontend-config.yaml
  - backend-deployment.yaml
  - chatbot-deployment.yaml
  - frontend-deployment.yaml
  - ingress.yaml
  - network-policy.yaml
  - external-secrets.yaml

commonLabels:
  app.kubernetes.io/managed-by: kustomize
  app.kubernetes.io/part-of: safevixai

patches:
  - patch: |-
      - op: add
        path: /spec/template/spec/priorityClassName
        value: safevixai-high
    target:
      kind: Deployment
      name: safevixai-backend
  - patch: |-
      - op: add
        path: /spec/template/spec/priorityClassName
        value: safevixai-high
    target:
      kind: Deployment
      name: safevixai-chatbot
  - patch: |-
      - op: add
        path: /spec/template/spec/priorityClassName
        value: safevixai-default
    target:
      kind: Deployment
      name: safevixai-frontend
  - patch: |-
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: safevixai-backend
    target:
      kind: Deployment
      name: safevixai-backend
  - patch: |-
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: safevixai-chatbot
    target:
      kind: Deployment
      name: safevixai-chatbot
  - patch: |-
      - op: add
        path: /spec/template/spec/serviceAccountName
        value: safevixai-frontend
    target:
      kind: Deployment
      name: safevixai-frontend
  - patch: |-
      - op: add
        path: /spec/template/spec/topologySpreadConstraints
        value:
          - maxSkew: 1
            topologyKey: topology.kubernetes.io/zone
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/part-of: safevixai
    target:
      kind: Deployment
