services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu-22.04
    volumes:
      - .:/workspace:cached
    command: /bin/sh -c "while sleep 1000; do :; done"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    network_mode: service:postgres

  postgres:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: safevixai
      POSTGRES_USER: safevix_admin
      POSTGRES_PASSWORD: safevix_dev_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safevix_admin -d safevixai"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
