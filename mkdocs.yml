site_name: SafeVixAI
site_description: Enterprise AI-Powered Road Safety Platform Documentation
site_url: https://safevixai.github.io/SafeVixAI/
site_author: SafeVixAI Team
repo_url: https://github.com/SafeVixAI/SafeVixAI
repo_name: SafeVixAI/SafeVixAI

theme:
  name: material
  custom_dir: docs/overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search:
      lang: en
      separator: '[\s\-_]+'
      prebuild_index: true
  - swagger-ui-tag:
      background: "#009688"
  - mkdocs-glossary:
      glossary_path: docs/glossary.md
  - exporter:
      formats:
        pdf:
          enabled: !ENV [MKDOCS_EXPORTER_PDF, false]
          concurrency: 4
          aggregator:
            enabled: true
            output: .well-known/safevixai-docs.pdf
            covers: all

# ── Multi-language (i18n) ─────────────────────────────────────────
# Uncomment to enable Indian language docs. Requires translated content.
# See: https://ultrabug.fr/mkdocs-static-i18n
#
# plugins:
#   - i18n:
#       default_language: en
#       docs_structure: suffix
#       languages:
#         en: English
#         hi: Hindi
#         ta: Tamil
#         te: Telugu
#         bn: Bengali
#         mr: Marathi
#         gu: Gujarati

hooks:
  - docs/hooks/analytics.py

extra:
  analytics:
    provider: custom
    feedback:
      title: Was this page helpful?
      ratings:
        - icon: material/emoticon-happy-outline
          name: This page was helpful
          data: 1
          note: >-
            Thanks for your feedback!
        - icon: material/emoticon-sad-outline
          name: This page could be improved
          data: 0
          note: >-
            Thanks for your feedback! Help us improve this page by
            using our <a href="https://github.com/SafeVixAI/SafeVixAI/issues/new?template=feedback.yml" target="_blank" rel="noopener">feedback form</a>.

extra_javascript:
  - javascripts/feedback.js

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: sandbox
          class: sandbox
          format: !!python/name:pymdownx.superfences.fence_code_format
        - name: interactive
          class: interactive
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - abbr

nav:
  - Overview: index.md
  - Getting Started:
      - Setup Guide: SETUP.md
      - Architecture: Architecture.md
      - Features: Features.md
  - AI & Agents:
      - Agent System: AGENTS.md
      - Chatbot Pipeline: AI_Instructions.md
      - Capabilities: SKILL.md
      - Tools & Intents: Agent.md
      - Offline Architecture: Offline_Architecture.md
  - Engineering:
      - Tech Stack: TechStack.md
      - Security: Security.md
      - Environment: Environment.md
  - API Reference:
      - Overview: API.md
      - Database Schema: Database.md
      - Backend OpenAPI: api/backend.md
      - Chatbot OpenAPI: api/chatbot.md
  - Runbooks:
      - All LLMs Down: runbooks/all-llms-down.md
      - Database Migration Rollback: runbooks/db-migration-rollback.md
      - Database Down: runbooks/db-down.md
      - Redis Down: runbooks/redis-down.md
      - Redis Recovery: runbooks/redis-recovery.md
      - Service Restart: runbooks/service-restart.md
      - Deployment Rollback: runbooks/deployment-rollback.md
      - API Key Rotation: runbooks/api-key-rotation.md
      - ChromaDB Rebuild: runbooks/chromadb-rebuild.md
      - High Error Rate: runbooks/high-error-rate.md
      - OOM Kill Response: runbooks/oom-kill-response.md
      - Smoke Tests: runbooks/smoke-tests.md
  - Design & UX:
      - Design System: DESIGN.md
      - UI/UX Specs: UIUX.md
  - Operations:
      - Deployment: Deployment.md
      - Data Sources: DataSources.md
      - Dataset Placement: DATASET_PLACEMENT.md
      - Roadmap: Roadmap.md
      - Contributing: Contributing.md
      - Resource Checklist: Complete_Project_Resource_Checklist.md
      - Changelog: CHANGELOG.md
  - Glossary: glossary.md
